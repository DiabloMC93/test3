<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen de Enfermería Geriátrica - Bloque 4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }

        .option-card {
            transition: all 0.2s ease;
            cursor: pointer;
            border: 2px solid #334155;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #1e293b;
        }

        .option-card.correct {
            border-color: #22c55e;
            background-color: #064e3b;
        }

        .option-card.incorrect {
            border-color: #ef4444;
            background-color: #7f1d1d;
        }

        .progress-bar {
            transition: width 0.4s ease-in-out;
        }

        .highlight-red {
            color: #f87171;
            text-decoration: underline;
            font-weight: 700;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Header / Stats -->
    <div class="max-w-3xl w-full mb-6 grid grid-cols-3 gap-4">
        <div class="bg-slate-800 p-4 rounded-xl text-center border border-slate-700 shadow-lg">
            <p class="text-xs uppercase tracking-wider text-slate-400">Progreso</p>
            <p id="current-index" class="text-xl md:text-2xl font-bold">1 / 24</p>
        </div>
        <div class="bg-slate-800 p-4 rounded-xl text-center border border-slate-700 shadow-lg">
            <p class="text-xs uppercase tracking-wider text-green-400">Aciertos</p>
            <p id="correct-count" class="text-xl md:text-2xl font-bold text-green-500">0</p>
        </div>
        <div class="bg-slate-800 p-4 rounded-xl text-center border border-slate-700 shadow-lg">
            <p class="text-xs uppercase tracking-wider text-red-400">Errores</p>
            <p id="wrong-count" class="text-xl md:text-2xl font-bold text-red-500">0</p>
        </div>
    </div>

    <!-- Progress Bar -->
    <div class="max-w-3xl w-full bg-slate-800 h-2 rounded-full mb-8 overflow-hidden">
        <div id="progress" class="progress-bar bg-indigo-500 h-full" style="width: 0%"></div>
    </div>

    <!-- Main Game Container -->
    <main id="game-container" class="max-w-3xl w-full bg-slate-800 rounded-2xl p-6 md:p-8 shadow-2xl border border-slate-700">
        <div id="question-screen">
            <h2 id="question-text" class="text-lg md:text-xl font-semibold mb-8 leading-relaxed">
                Cargando pregunta...
            </h2>
            <div id="options-container" class="space-y-3">
                <!-- Options injected here -->
            </div>
            <button id="next-btn" class="mt-8 w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl transition shadow-lg hidden">
                Siguiente Pregunta
            </button>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden text-center py-10">
            <h2 class="text-3xl font-bold mb-4">¡Bloque Completado!</h2>
            <div class="text-6xl mb-6">📝</div>
            <p id="final-stats" class="text-lg text-slate-300 mb-8"></p>
            <button onclick="location.reload()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-8 rounded-xl transition">
                Reiniciar Bloque
            </button>
        </div>
    </main>

    <script>
        const questions = [
            { id: 53, q: "<span class='highlight-red'>NO</span> es verdad que:", options: ["El derecho a la jubilación es un pilar del Estado de bienestar.", "La pensión contributiva es proporcional a la cotización de la vida laboral.", "La edad de la jubilación tiende a alargarse para adaptarse a la esperanza de vida.", "La pensión en nuestro país es un prestación a los trabajadores al final de su vida laboral."], correct: 2 },
            { id: 54, q: "En la necesidad de alimentación se pueden dar recomendaciones prácticas (señala la respuesta <span class='highlight-red'>FALSA</span>):", options: ["Educación sobre una correcta alimentación.", "Visita periódica al digestivo.", "Potenciar que el acto de comer se realice en compañía y despacio.", "Visita periódica al odontólogo."], correct: 1 },
            { id: 55, q: "Cuando el dolor es desproporcionado puede estar influido por (señala la respuesta <span class='highlight-red'>FALSA</span>):", options: ["Edad, debe ser desatendido.", "Labilidad emocional.", "Confusión mental.", "Necesidad de llamar la atención."], correct: 0 },
            { id: 56, q: "Elige la afirmación <span class='text-green-400'>CORRECTA</span> para favorecer una atención domiciliaria óptima en pacientes en SUD:", options: ["En atención domiciliaria está contraindicada la infusión de suero intravenoso.", "El sondaje vesical domiciliario es deseable para no molestarle con cambios de absorbentes.", "A veces se puede usar hipodermoclisis en pacientes en su domicilio.", "Los pacientes que pueden ingerir alimentos necesitan sondaje nasogástrico."], correct: 2 },
            { id: 57, q: "Entre los fármacos más empleados por vía subcutánea en el SUD, <span class='highlight-red'>NO</span> está:", options: ["Midazolam.", "Nolotil.", "Morfina.", "Hioscina."], correct: 1 },
            { id: 58, q: "El envejecimiento afecta al sentido de la vista y aparece (señala la respuesta <span class='highlight-red'>FALSA</span>):", options: ["Disminución del tamaño pupilar.", "Disminución de la secreción lagrimal.", "Palidez de las conjuntivas.", "Hipermetropía.", "Presbiopía y ptosis."], correct: 3 },
            { id: 59, q: "El líder del equipo multidisciplinario es:", options: ["El profesional de enfermería siempre.", "Depende de la situación y características específicas del caso.", "El geriatra cuando el anciano tiene pluripatología.", "El trabajador social si el anciano no tiene familia."], correct: 1 },
            { id: 61, q: "Las causas que han llevado al desarrollo de la Gerontología y la Geriatría son:", options: ["Mayores conocimientos científicos en torno al envejecimiento.", "Aumento de la presión demográfica y repercusiones socioeconómicas.", "Todas son ciertas.", "Mayor conciencia de justicia social."], correct: 2 },
            { id: 62, q: "Señala la respuesta <span class='highlight-red'>FALSA</span>. Normas para el correcto cumplimiento del tratamiento:", options: ["Facilitar la comprensión del tratamiento.", "Controlar el peso.", "Controlar el tratamiento.", "Facilitar el cumplimiento del tratamiento.", "Valoración de las dificultades en el seguimiento del tratamiento."], correct: 1 },
            { id: 63, q: "Señala la respuesta <span class='highlight-red'>INCIERTA</span> sobre abordaje de LPP y PLH:", options: ["Reducir carga bacteriana si hay desequilibrio.", "El tejido necrótico requiere desbridamiento continuo.", "La mejor forma de desbridamiento en lesión extensa es la cirugía siempre.", "Usar apósitos de cura húmeda para regular el exudado."], correct: 2 },
            { id: 64, q: "Señale la <span class='highlight-red'>INCORRECTA</span>. Los pilares básicos de la Geriatría son:", options: ["VGI.", "Equipo multidisciplinario.", "Niveles asistenciales.", "Los cuidados de enfermería."], correct: 3 },
            { id: 65, q: "Fracturas de cadera por caídas y su repercusión, es <span class='highlight-red'>FALSO</span>:", options: ["El 85% quedan muy limitados.", "Necesita hospitalización e intervención quirúrgica.", "Reciben buena atención prehospitalaria.", "Se produce 25% de fallecimientos en 6 meses."], correct: 2 },
            { id: 66, q: "Señale la respuesta <span class='highlight-red'>FALSA</span> respecto a las AVD-A (Avanzadas):", options: ["Permiten la participación en actos comunitarios.", "Permiten a una persona desarrollar un rol social.", "Son las últimas en desaparecer en el envejecimiento.", "Es un concepto de más reciente aparición.", "Son las actividades más complejas."], correct: 2 },
            { id: 68, q: "En el envejecimiento del corazón, señala la afirmación <span class='highlight-red'>FALSA</span>:", options: ["La aorta disminuye su calibre y volumen.", "Atrofia y esclerosis cardiacas.", "Aparecen rigideces valvulares.", "La elasticidad de los vasos sanguíneos se reduce."], correct: 0 },
            { id: 69, q: "En la pirámide poblacional española ¿podemos deducir que las generaciones son estables?", options: ["No, aparecen grupos de edad que son mayores que otros.", "No, hay muchos factores que las hacen iguales.", "Si, son reflejo de las características de cada país.", "Si, a la larga los grupos se igualan."], correct: 0 },
            { id: 70, q: "Señala la respuesta <span class='highlight-red'>INCORRECTA</span> sobre mortalidad por caídas:", options: ["Si el tiempo en el suelo es > 60 min.", "Con la edad.", "Si el tiempo en el suelo es > 120 min.", "Inmovilizados previamente."], correct: 0 },
            { id: 71, q: "Las escalas más usadas para la valoración de las AVD básicas son:", options: ["Escala de la Cruz Roja, Índice de actividades de Katz y Escala de Lobo.", "Escala de Barthel, Índice de Katz y Escala de Lawton.", "Escala de Katz, Escala del Centro de Filadelfia y Escala de la Cruz Roja de Madrid.", "Miniexamen de Lobo, Escala de Yesavage, Índice de Katz.", "Escala de Barthel, Escala de incapacidad física de la Cruz Roja, Índice de Katz"], correct: 4 },
            { id: 72, q: "Cambios a nivel óseo por envejecimiento. Señala la respuesta <span class='highlight-red'>FALSA</span>:", options: ["Disminución de la talla.", "Cervicalgia.", "Cifosis dorsal.", "La masa ósea disminuye y se desmineraliza."], correct: 1 },
            { id: 74, q: "Respecto a Marjorie Warren es <span class='highlight-red'>INCIERTO</span> que:", options: ["Clasificó a los ancianos según deambulación.", "Basó su trabajo en el examen personal e historia social.", "Basó su trabajo en la medicina curativa.", "Demostró que la asistencia específica mejoraba la morbi-mortalidad."], correct: 2 },
            { id: 75, q: "Señala la respuesta <span class='highlight-red'>FALSA</span>. Fármacos que con mayor frecuencia se automedican:", options: ["Fármacos para procesos crónicos.", "Medicamentos prescritos para estados muy graves.", "Fármacos prescritos con anterioridad.", "Medicamentos para estados poco graves."], correct: 1 },
            { id: 77, q: "Para la valoración de la depresión en ancianos se usa:", options: ["Escala de Incapacidad Mental de la Cruz Roja.", "Escala de Yesavage.", "Miniexamen cognitivo de Lobo.", "Test de Pfeiffer."], correct: 1 },
            { id: 78, q: "Incremento progresivo de necesidades de atención de personas mayores:", options: ["Es verdadero. Hay aumento de requerimientos.", "Es falso, por eso hay que desarrollar ciencias gerontológicas.", "No es verdadero, necesitan mayor gasto farmacéutico.", "Es cierto, es el sector mayoritario de la población."], correct: 0 },
            { id: 79, q: "Señala la afirmación <span class='text-green-400'>VERDADERA</span>:", options: ["Tras una caída siempre se es paciente de alto riesgo.", "Una persona con pluripatología es paciente geriátrico.", "Una persona mayor que vive sola se considera paciente de alto riesgo.", "Una persona frágil tiene que cumplir varios requisitos (ej: >80 años)."], correct: 3 },
            { id: 80, q: "Seleccione la afirmación <span class='highlight-red'>FALSA</span>:", options: ["La visita domiciliaria es esencial en el seguimiento del alto riesgo.", "El objetivo principal en pacientes frágiles no es la prevención.", "En atención primaria se van a tratar todos los pacientes geriátricos.", "Los programas de crónicos son ideales para pacientes frágiles."], correct: 1 }
        ];

        let currentQuestion = 0;
        let correctAnswers = 0;
        let wrongAnswers = 0;
        let answered = false;

        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const nextBtn = document.getElementById('next-btn');
        const currentIndexLabel = document.getElementById('current-index');
        const correctCountLabel = document.getElementById('correct-count');
        const wrongCountLabel = document.getElementById('wrong-count');
        const progressBar = document.getElementById('progress');
        const resultScreen = document.getElementById('result-screen');
        const finalStats = document.getElementById('final-stats');

        function loadQuestion() {
            answered = false;
            nextBtn.classList.add('hidden');
            const qData = questions[currentQuestion];
            
            questionText.innerHTML = `${qData.id}. ${qData.q}`;
            currentIndexLabel.innerText = `${currentQuestion + 1} / ${questions.length}`;
            progressBar.style.width = `${((currentQuestion) / questions.length) * 100}%`;
            
            optionsContainer.innerHTML = '';
            qData.options.forEach((opt, index) => {
                const button = document.createElement('div');
                button.className = 'option-card p-4 rounded-xl flex items-center gap-4 bg-slate-800/50 border-slate-700';
                button.innerHTML = `
                    <span class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center font-bold text-sm shrink-0">
                        ${String.fromCharCode(65 + index)}
                    </span>
                    <span class="text-md leading-tight">${opt}</span>
                `;
                button.onclick = () => selectOption(index, button);
                optionsContainer.appendChild(button);
            });
        }

        function selectOption(index, element) {
            if (answered) return;
            answered = true;
            
            const correctIndex = questions[currentQuestion].correct;
            const options = optionsContainer.children;

            if (index === correctIndex) {
                element.classList.add('correct');
                correctAnswers++;
                correctCountLabel.innerText = correctAnswers;
            } else {
                element.classList.add('incorrect');
                options[correctIndex].classList.add('correct');
                wrongAnswers++;
                wrongCountLabel.innerText = wrongAnswers;
            }
            nextBtn.classList.remove('hidden');
        }

        nextBtn.onclick = () => {
            currentQuestion++;
            if (currentQuestion < questions.length) {
                loadQuestion();
            } else {
                progressBar.style.width = "100%";
                showResults();
            }
        };

        function showResults() {
            document.getElementById('question-screen').classList.add('hidden');
            resultScreen.classList.remove('hidden');
            const score = Math.round((correctAnswers / questions.length) * 100);
            finalStats.innerHTML = `
                Bloque 4 Finalizado:<br>
                <span class="text-green-500 font-bold">Aciertos: ${correctAnswers}</span> | 
                <span class="text-red-500 font-bold">Errores: ${wrongAnswers}</span><br>
                <div class="text-4xl font-bold mt-4">${score}% Correcto</div>
            `;
        }

        loadQuestion();
    </script>
</body>
</html>
